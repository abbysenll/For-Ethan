<!DOCTYPE html>
<html>
<head>
  <title>Card</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      font-family: Arial;
    }

    .container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card {
      width: 200px;
      height: 300px;
      background: white;
      border: 2px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 10px;
    }

    .arrow {
      font-size: 30px;
      cursor: pointer;
      user-select: none;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LEFT PANEL (always visible) -->
    <div class="card" id="leftCard">
      <h2>Title Here</h2>
    </div>

    <!-- RIGHT ARROW -->
    <div class="arrow" onclick="openCard()">➡️</div>

    <!-- RIGHT PANEL 1 -->
    <div class="card hidden" id="card1">
      <p>Text here</p>
    </div>

    <!-- RIGHT PANEL 2 -->
    <div class="card hidden" id="card2">
      <p>More text here</p>
    </div>

  </div>

  <script>
    function openCard() {
      document.getElementById("card1").classList.remove("hidden");
      document.getElementById("card2").classList.remove("hidden");
    }
  </script>

</body>
</html>

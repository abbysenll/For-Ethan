<!DOCTYPE html>
<html>
<head>
  <title>Card</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      align-items: center;
      justify-content: center; /* center everything horizontally */
      gap: 20px; /* more space for bigger cards */
    }

    .card {
      width: 300px; /* bigger width */
      height: 400px; /* bigger height */
      background: white;
      border: 2px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      transition: transform 0.4s ease, opacity 0.4s ease;
    }

    .hidden {
      opacity: 0;
      transform: scale(0.8);
      pointer-events: none;
    }

    .arrow-btn {
      width: 50px;
      height: 50px;
      border: 2px solid black;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 25px;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }

    .arrow-btn:hover {
      background: #e0e0e0;
    }

  </style>
</head>
<body>

  <div class="container">

    <!-- LEFT PANEL -->
    <div class="card" id="leftCard">
      <h2>Title Here</h2>
    </div>

    <!-- RIGHT ARROW BUTTON -->
    <div class="arrow-btn" onclick="openCard()">▶</div>

    <!-- RIGHT PANEL 1 -->
    <div class="card hidden" id="card1">
      <p>Text here</p>
    </div>

    <!-- RIGHT PANEL 2 -->
    <div class="card hidden" id="card2">
      <p>More text here</p>
    </div>

  </div>

  <script>
    function openCard() {
      const left = document.getElementById("leftCard");
      const c1 = document.getElementById("card1");
      const c2 = document.getElementById("card2");

      // Animate left card disappearance
      left.style.transform = "scale(0.8)";
      left.style.opacity = "0";

      setTimeout(() => {
        left.classList.add("hidden");
        // Show right cards
        c1.classList.remove("hidden");
        c2.classList.remove("hidden");
      }, 300);
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Overlay Side-by-Side Cards</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .container {
      position: relative;
      width: 800px;   /* double the original width to fit side by side */
      height: 700px;  /* same as original height */
    }

    .card {
      width: 400px;   /* original card size */
      height: 700px;
      background: white;
      border: 2px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      position: absolute;
      top: 0;
      transition: opacity 0.5s ease;
    }

    /* Original card in center */
    #originalCard {
      left: 200px; /* center in 800px container */
    }

    /* Left overlay card */
    #leftCard {
      left: 0;
    }

    /* Right overlay card */
    #rightCard {
      left: 400px;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Original card -->
    <div class="card" id="originalCard">Title</div>

    <!-- Left overlay card -->
    <div class="card hidden" id="leftCard">Left</div>

    <!-- Right overlay card -->
    <div class="card hidden" id="rightCard">Right</div>
  </div>

  <script>
    // Example: show overlay cards after 1 second
    setTimeout(() => {
      document.getElementById('originalCard').classList.add('hidden');
      document.getElementById('leftCard').classList.remove('hidden');
      document.getElementById('rightCard').classList.remove('hidden');
    }, 1000);
  </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Split Cards Overlay</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .container {
      position: relative; /* for overlaying cards */
      width: 400px;  /* same as initial card */
      height: 700px; /* same as initial card */
    }

    .card {
      width: 400px;
      height: 700px;
      background: white;
      border: 2px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      position: absolute;
      top: 0;
      left: 0;
      transition: transform 0.5s ease, opacity 0.5s ease;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }

    .split {
      width: 200px; /* half of original card */
      left: 0;
    }

    .split.right {
      left: 200px; /* position right half */
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Original large card -->
    <div class="card" id="originalCard">Title</div>

    <!-- Left overlay card -->
    <div class="card hidden split" id="leftCard">Left</div>

    <!-- Right overlay card -->
    <div class="card hidden split right" id="rightCard">Right</div>
  </div>

  <script>
    // Example: show split cards after 1 second
    setTimeout(() => {
      document.getElementById('originalCard').classList.add('hidden');
      document.getElementById('leftCard').classList.remove('hidden');
      document.getElementById('rightCard').classList.remove('hidden');
    }, 1000);
  </script>

</body>
</html>
